<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منوی آنلاین شیک</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 0.5px, transparent 0.5px);
            background-size: 10px 10px;
            color: #334155;
            padding-bottom: 50px;
        }

        /* هدر شیشه‌ای بالای صفحه */
        header {
            text-align: center;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 900;
            color: #0f172a;
        }

        header p {
            color: #64748b;
            margin-top: 5px;
            font-size: 1.1rem;
        }

        /* شبکه چیدمان محصولات */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 40px auto 0 auto;
            padding: 0 20px;
        }

        /* کارت محصول */
        .menu-item {
            background-color: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.07);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #edf2f7;
            position: relative;
        }

        .menu-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: #cbd5e1;
        }

        .menu-item img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
            border-bottom: 4px solid #3b82f6; 
        }

        /* نام محصول (همراه با هشتگ برای زیبایی زنده) */
        .menu-item h3 {
            padding: 20px 15px;
            font-size: 1.4rem;
            color: #1e293b;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(to right, #ffffff, #f1f5f9);
            direction: ltr; /* برای نمایش درست کاراکتر هشتگ کنار عدد */
        }
    </style>
</head>
<body>

    <header>
        <h1>فروشگاه</h1>
        <p>لیست محصولات آنلاین</p>
    </header>

    <main class="menu-grid" id="menuContainer"></main>

    <script>
        // تعداد کل محصولات شما (از 1 تا 70)
        const totalProducts = 68;
        const container = document.getElementById('menuContainer');

        for (let i = 1; i <= totalProducts; i++) {
            // تبدیل عدد به فرمت سه رقمی (مثلاً 001، 002 و ...)
            const formattedNumber = String(i).padStart(3, '0');
            
            // آدرس‌دهی مستقیم و ساده به پوشه تصاویر بر اساس نام‌های جدید شما
            const imagePath = `image/${formattedNumber}.jpg`;
            
            // نامی که زیر عکس به کاربر نمایش داده می‌شود (مثلاً #001)
            const displayName = `#${formattedNumber}`;

            // تولید کارت محصول
            const menuItem = document.createElement('div');
            menuItem.className = 'menu-item';
            menuItem.innerHTML = `
                <img src="${imagePath}" alt="${displayName}">
                <h3>${displayName}</h3>
            `;
            
            container.appendChild(menuItem);
        }
    </script>

</body>
</html>
